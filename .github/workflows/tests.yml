name: Tests

on:
  push:
    branches:
      - network-perturbation-tests
  pull_request:
    branches:
      - network-perturbation-tests

jobs:
  test:
    name: Full test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
